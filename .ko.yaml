# Ko configuration for multi-architecture builds
defaultPlatforms:
  - linux/amd64
  - linux/arm64

# Base image (distroless for security and small size)
defaultBaseImage: gcr.io/distroless/static-debian11:nonroot

# Build settings
builds:
  - id: tracker-slack
    main: .
    env:
      - CGO_ENABLED=0
    ldflags:
      - -s -w
